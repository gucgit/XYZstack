# ─────────────────────────────────────────────────────────
# Application
# ─────────────────────────────────────────────────────────
spring.application.name=taskmanager-backend
server.port=8080

# ─────────────────────────────────────────────────────────
# Database — values injected via K8s Secret / Secrets Manager
# DB_HOST → RDS endpoint
# DB_NAME, DB_USERNAME, DB_PASSWORD → from AWS Secrets Manager
# ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:taskdb}
spring.datasource.username=${DB_USERNAME:taskuser}
spring.datasource.password=${DB_PASSWORD:taskpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ─────────────────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────────────────
# Actuator — exposes /actuator/health, /actuator/prometheus
# ─────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# ─────────────────────────────────────────────────────────
# CORS — override via K8s ConfigMap in production
# ─────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────
logging.level.com.taskmanager=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
