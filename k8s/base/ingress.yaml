# ─────────────────────────────────────────────────────────
# Ingress — AWS ALB Controller
# Requires: aws-load-balancer-controller installed via Helm
#
# Routing rules:
#   /api/*   → backend service (Spring Boot)
#   /*       → frontend service (React/Nginx)
# ─────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskmanager-ingress
  annotations:
    # ALB controller annotations
    kubernetes.io/ingress.class:                        alb
    alb.ingress.kubernetes.io/scheme:                   internet-facing
    alb.ingress.kubernetes.io/target-type:              ip
    alb.ingress.kubernetes.io/listen-ports:             '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path:         /actuator/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/success-codes:            "200"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60
spec:
  rules:
    - http:
        paths:
          # API traffic → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: taskmanager-backend-svc
                port:
                  number: 80

          # Actuator (Prometheus scraping) → backend
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: taskmanager-backend-svc
                port:
                  number: 80

          # Everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskmanager-frontend-svc
                port:
                  number: 80
